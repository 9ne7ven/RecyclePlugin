  golden_pickaxe:   {material: GOLD_INGOT, min: 0, max: 2}
  golden_axe:       {material: GOLD_INGOT, min: 0, max: 2}
  golden_shovel:    {material: GOLD_INGOT, min: 0, max: 2}
  golden_hoe:       {material: GOLD_INGOT, min: 0, max: 2}

