name: RecyclePlugin
main: com.svncho.RecyclePlugin
version: 1.1.0
api-version: 1.21
author: svncho_
description: Fully configurable recycling system with GUI and XP rewards.

commands:
  recycle:
    description: Open the recycling GUI
    usage: /recycle
  rpadmin:
    description: Reload the plugin configuration
    usage: /rpadmin reload
    permission: recycleplugin.reload

permissions:
  recycleplugin.reload:
    description: Allows reloading the plugin
    default: op
  recycleplugin.use:
    description: Allows using the recycler
    default: true